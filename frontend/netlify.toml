# Netlify deploy config for the React frontend.
#
# In the Netlify dashboard, set "Base directory" to `frontend` if this repo
# is connected at its root (Netlify also auto-detects this file once the
# base directory is set). Set the VITE_API_BASE_URL environment variable
# in Netlify's site settings to the deployed FastAPI backend's URL
# (e.g. the Render service from ../render.yaml).

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: client-side routes (e.g. /new-campaign) must resolve to
# index.html rather than a 404 on a hard refresh or direct link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
